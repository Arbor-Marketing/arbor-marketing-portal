<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ARBOR Marketing Portal</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            text-align: center;
            background: white;
            border-radius: 12px;
            padding: 60px 40px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            max-width: 600px;
        }
        
        h1 {
            color: #2d3748;
            margin-bottom: 15px;
            font-size: 2.5em;
        }
        
        .subtitle {
            color: #718096;
            margin-bottom: 50px;
            font-size: 1.1em;
        }
        
        .links {
            display: flex;
            gap: 20px;
            flex-direction: column;
        }
        
        a {
            display: inline-block;
            padding: 18px 40px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 1.1em;
            transition: all 0.3s ease;
        }
        
        .btn-calendar {
            background: #667eea;
            color: white;
        }
        
        .btn-calendar:hover {
            background: #5a67d8;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.4);
        }
        
        .btn-flyer {
            background: #764ba2;
            color: white;
        }
        
        .btn-flyer:hover {
            background: #6d3f8f;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(118, 75, 162, 0.4);
        }
        
        .logo {
            font-size: 3em;
            margin-bottom: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">🌳</div>
        <h1>ARBOR Marketing Portal</h1>
        <p class="subtitle">Marketing Calendar & Flyer Generator</p>
        
        <div class="links">
            <a href="calendar.html" class="btn-calendar">📅 Marketing Calendar 2026</a>
            <a href="flyer-generator.html" class="btn-flyer">✨ Flyer Generator</a>
        </div>
    </div>
</body>
</html>
